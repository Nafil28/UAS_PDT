version: "3.9"

services:

  # ==========================
  # Laravel
  # ==========================
  laravel:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: ajidabloom-laravel
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./laravel:/var/www
    networks:
      - ajidabloom-network
    depends_on:
      - postgres-primary
      - mongodb

  # ==========================
  # Nginx
  # ==========================
  nginx:
    image: nginx:latest
    container_name: ajidabloom-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./laravel:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel
    networks:
      - ajidabloom-network

  # ==========================
  # PostgreSQL Primary
  # ==========================
  postgres-primary:
    image: postgres:16
    container_name: ajidabloom-postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_DB: ajidabloom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
    networks:
      - ajidabloom-network

  # ==========================
  # PostgreSQL Replica
  # ==========================
  postgres-replica:
    image: postgres:16
    container_name: ajidabloom-postgres-replica
    restart: unless-stopped
    environment:
      POSTGRES_DB: ajidabloom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    networks:
      - ajidabloom-network

  # ==========================
  # MongoDB
  # ==========================
  mongodb:
    image: mongo:7
    container_name: ajidabloom-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ajidabloom-network

  # ==========================
  # PgAdmin
  # ==========================
  pgadmin:
    image: dpage/pgadmin4
    container_name: ajidabloom-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ajidabloom.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres-primary
    networks:
      - ajidabloom-network

  # ==========================
  # Mongo Express
  # ==========================
  mongo-express:
    image: mongo-express
    container_name: ajidabloom-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - ajidabloom-network

networks:
  ajidabloom-network:

volumes:
  postgres_primary_data:
  postgres_replica_data:
  mongodb_data: